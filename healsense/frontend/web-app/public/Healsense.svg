<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="healGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Heart shape with pulse line -->
  <g id="heart">
    <path d="M100,170 C100,170 30,120 30,80 C30,60 45,45 65,45 C80,45 90,55 100,70 C110,55 120,45 135,45 C155,45 170,60 170,80 C170,120 100,170 100,170 Z" 
          fill="url(#healGradient)" stroke="#047857" stroke-width="3"/>
  </g>
  
  <!-- Pulse line -->
  <g id="pulse" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50,100 L70,100 L80,70 L90,130 L100,80 L110,110 L120,100 L150,100" opacity="0.9"/>
  </g>
  
  <!-- Plus symbol in circle -->
  <g id="plus">
    <circle cx="160" cy="50" r="25" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
    <path d="M160,40 L160,60 M150,50 L170,50" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
